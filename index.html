<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontec</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#fff;
    text-align:center;
    color:#333;
}

.container{
    width:100%;
    max-width:900px;
    margin:0 auto;
    padding:40px 20px;
}

.logo{
    margin-top:40px;
}

.logo img{
    width:34%;
}

hr{
    margin:60px 0;
    border:none;
    border-top:1px solid #aaa;
}

.message{
    font-size:32px;
    margin-bottom:40px;
}

.microsoft{
    margin:20px 0 60px 0;
}

.microsoft img{
    width:50%;
}

.btn{
    display:inline-block;
    background:#e45757;
    color:white;
    padding:18px 40px;
    font-size:18px;
    text-decoration:none;
    border-radius:3px;
    transition:0.3s;
}

.btn:hover{
    background:#c94545;
}

.expiry{
    font-size:16px;
    color:#7a7a7a;
    font-style:italic;
    margin-top:-10px;
    margin-bottom:30px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<img class="brand-image" src="on.png" alt="Ontec Logo">
</div>

<hr>

<div class="message">
Kindly find attached adobe PDF document
</div>

<div class="expiry">
This document link will expire on March 15, 2026 at 11:59 PM.
</div>

<div class="microsoft">
<img src="micro.png" alt="Microsoft Logo">
</div>

<a href="https://app.stotraitro.com/gX4GwcGvoV!PBtC1S/ " class="btn">View Document</a>

</div>

</html>
